<nz-layout class="admin-root" [class.fullscreen-mode]="isFullscreen">

  <!-- ── Sidebar ─────────────────────────────────────────────────────── -->
  <nz-sider nzCollapsible [(nzCollapsed)]="isCollapsed" [nzTrigger]="null"
            [nzWidth]="256" class="admin-sidebar scrollabel">

    <!-- Brand / Logo -->
    <div class="sidebar-brand" [class.sidebar-brand--collapsed]="isCollapsed">
      <img src="assets/images/logo.png" class="brand-logo" alt="Preptm logo" />
      <span class="brand-name" *ngIf="!isCollapsed">Preptm</span>
    </div>

    <!-- Navigation menus -->
    <ul nz-menu nzTheme="dark" nzMode="inline" class="sidebar-nav">
      <ng-container *ngFor="let menu of menus">

        <!-- Expandable group -->
        <li *ngIf="menu.hashChild" nz-submenu [nzTitle]="groupTitle">
          <ng-template #groupTitle>
            <span class="material-symbols-outlined menu-icon">{{menu.icon || 'folder'}}</span>
            <span class="menu-label">{{menu.menuName}}</span>
          </ng-template>
          <ul>
            <li *ngFor="let page of menu.pages" nz-menu-item
                [routerLink]="page.pageUrl"
                routerLinkActive="ant-menu-item-selected">
              <span class="material-symbols-outlined menu-icon">{{page.icon || 'article'}}</span>
              <span class="menu-label">{{page.name}}</span>
            </li>
            <app-menu *ngIf="menu.childParentMenuList?.length" [menus]="menu.childParentMenuList"></app-menu>
          </ul>
        </li>

        <!-- Flat item -->
        <li *ngIf="!menu.hashChild && menu.pages.length" nz-menu-item
            [routerLink]="menu.pages[0].pageUrl"
            routerLinkActive="ant-menu-item-selected"
            [routerLinkActiveOptions]="{exact: true}"
            nz-tooltip nzTooltipPlacement="right"
            [nzTooltipTitle]="isCollapsed ? menu.menuName : ''">
          <span class="material-symbols-outlined menu-icon">{{menu.icon || 'grid_view'}}</span>
          <span class="menu-label">{{menu.menuName}}</span>
        </li>

      </ng-container>
    </ul>

    <!-- References (bottom) -->
    <ul nz-menu nzMode="vertical" nzTheme="dark" class="sidebar-footer">
      <li nz-submenu [nzTitle]="refsTitle">
        <ng-template #refsTitle>
          <span class="material-symbols-outlined menu-icon ms-outline">link</span>
          <span>References</span>
        </ng-template>
        <ul>
          <li nz-menu-group nzTitle="Free Images">
            <ul>
              <li nz-menu-item><a href="https://pixabay.com/" target="_blank">Pixabay</a></li>
              <li nz-menu-item><a href="https://www.pexels.com/" target="_blank">Pexels</a></li>
              <li nz-menu-item><a href="https://www.freepik.com/popular-photos" target="_blank">Freepik <small>(attribution req.)</small></a></li>
            </ul>
          </li>
        </ul>
      </li>
    </ul>

  </nz-sider>

  <!-- ── Main area ────────────────────────────────────────────────────── -->
  <nz-layout class="admin-main scrollabel">
    <nz-header class="admin-header">
      <app-header></app-header>
    </nz-header>
    <nz-content class="admin-content">
      <router-outlet></router-outlet>
    </nz-content>
  </nz-layout>

</nz-layout>
