<div class="signin-wrapper">

  <!-- ── Form panel ──────────────────────────────────────────────────── -->
  <div class="signin-card">

    <div class="signin-brand">
      <img src="assets/images/logo.png" class="signin-logo" alt="Preptm">
      <span class="signin-app-name">Preptm Admin</span>
    </div>

    <h2 class="signin-title">Welcome back</h2>
    <p class="signin-subtitle">Sign in to your admin account</p>

    <form [formGroup]="form" class="signin-form">
      <app-text label="Email address" [form]="form" formControlName="email"></app-text>
      <app-text label="Password" [isPassword]="true" [form]="form" formControlName="password"></app-text>

      <button nz-button nzType="primary" [nzSize]="'large'" class="signin-btn"
              [nzLoading]="form.disabled" [disabled]="form.disabled" (click)="signIn()">
        <span class="material-symbols-outlined">login</span>
        Sign in
      </button>
    </form>

  </div>

  <!-- ── Branded panel ───────────────────────────────────────────────── -->
  <div class="signin-panel" aria-hidden="true">
    <div class="panel-blob panel-blob--tl"></div>
    <div class="panel-blob panel-blob--br"></div>

    <div class="panel-content">
      <img src="assets/images/logo.png" class="panel-logo" alt="">
      <h2 class="panel-headline">The smarter way to manage your content</h2>
      <p class="panel-sub">Publish articles, manage recruitments, and grow your platform — all from one place.</p>

      <div class="panel-pills">
        <span class="pill"><span class="material-symbols-outlined">article</span> Articles</span>
        <span class="pill"><span class="material-symbols-outlined">work</span> Recruitment</span>
        <span class="pill"><span class="material-symbols-outlined">bar_chart</span> Reports</span>
      </div>
    </div>
  </div>

</div>
