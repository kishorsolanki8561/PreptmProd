<app-page-header [breadcrumb]="breadcrumb" [addButtonUrl]="addPageUrl">

</app-page-header>
<main class="card">
    <app-table [initialData]="initialData" [columns]="columns" [getDataFn$]="recruitmentService.getRecruitmentList"

        [progressUpdateFn$]="recruitmentService.updateProgress" [editPageUrl]="editPageUrl" [viewPageUrl]="viewPageUrl"
        [deleteFn$]="recruitmentService.deleteRecruitment" [filter]="filter"></app-table>
</main>
