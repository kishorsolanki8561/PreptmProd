name: Deploy Stage AllDropDown Microservice

on:
  push:
    branches: [main]
    paths:
      - 'backend/AllDropDownMicroService/**'
      - 'backend/CommonService/**'
      - 'backend/DBInfrastructure/**'
      - 'backend/ModelService/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Publish AllDropDownMicroService
        run: |
          dotnet publish backend/AllDropDownMicroService/AllDropDownMicroService.csproj \
            -c Release \
            --no-self-contained \
            -r linux-x64 \
            -o ./publish/alldropdown

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare server directories
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "mkdir -p /root/preptm/BackEnd/Stage/AllDropDownMicroService"

      - name: Stop service before deploy
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "systemctl stop preptm-dropdown-api || true"

      - name: Sync build output to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa" \
            ./publish/alldropdown/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/root/preptm/BackEnd/Stage/AllDropDownMicroService/

      - name: Register systemd service
        run: |
          cat > /tmp/preptm-dropdown-api.service << 'UNIT'
          [Unit]
          Description=PreptM Stage AllDropDown Microservice
          After=network.target

          [Service]
          WorkingDirectory=/root/preptm/BackEnd/Stage/AllDropDownMicroService
          ExecStart=/usr/bin/dotnet /root/preptm/BackEnd/Stage/AllDropDownMicroService/AllDropDownMicroService.dll
          Restart=always
          RestartSec=10
          KillSignal=SIGINT
          SyslogIdentifier=preptm-dropdown-api
          Environment=ASPNETCORE_ENVIRONMENT=Staging
          Environment=ASPNETCORE_URLS=http://127.0.0.1:5294
          Environment=DOTNET_PRINT_TELEMETRY_MESSAGE=false

          [Install]
          WantedBy=multi-user.target
          UNIT
          scp -i ~/.ssh/id_rsa /tmp/preptm-dropdown-api.service \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/preptm-dropdown-api.service
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            mv /tmp/preptm-dropdown-api.service /etc/systemd/system/preptm-dropdown-api.service &&
            systemctl daemon-reload &&
            systemctl enable preptm-dropdown-api
          "

      - name: Start service
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "systemctl start preptm-dropdown-api && systemctl status preptm-dropdown-api --no-pager"
