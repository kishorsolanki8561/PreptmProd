name: Deploy Stage Master Microservice

on:
  push:
    branches: [main]
    paths:
      - 'backend/MasterMicroService/**'
      - 'backend/CommonService/**'
      - 'backend/DBInfrastructure/**'
      - 'backend/ModelService/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Publish MasterMicroService
        run: |
          dotnet publish backend/MasterMicroService/MasterMicroService.csproj \
            -c Release \
            --no-self-contained \
            -r linux-x64 \
            -o ./publish/master

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare server directories
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "mkdir -p /root/preptm/BackEnd/Stage/MasterMicroService"

      - name: Stop service before deploy
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "systemctl stop preptm-master-api || true"

      - name: Sync build output to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa" \
            ./publish/master/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/root/preptm/BackEnd/Stage/MasterMicroService/

      - name: Register systemd service
        run: |
          cat > /tmp/preptm-master-api.service << 'UNIT'
          [Unit]
          Description=PreptM Stage Master Microservice
          After=network.target

          [Service]
          WorkingDirectory=/root/preptm/BackEnd/Stage/MasterMicroService
          ExecStart=/usr/bin/dotnet /root/preptm/BackEnd/Stage/MasterMicroService/MasterMicroService.dll
          Restart=always
          RestartSec=10
          KillSignal=SIGINT
          SyslogIdentifier=preptm-master-api
          Environment=ASPNETCORE_ENVIRONMENT=Staging
          Environment=ASPNETCORE_URLS=http://127.0.0.1:5256
          Environment=DOTNET_PRINT_TELEMETRY_MESSAGE=false

          [Install]
          WantedBy=multi-user.target
          UNIT
          scp -i ~/.ssh/id_rsa /tmp/preptm-master-api.service \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/preptm-master-api.service
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            mv /tmp/preptm-master-api.service /etc/systemd/system/preptm-master-api.service &&
            systemctl daemon-reload &&
            systemctl enable preptm-master-api
          "

      - name: Start service
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "systemctl start preptm-master-api && systemctl status preptm-master-api --no-pager"
