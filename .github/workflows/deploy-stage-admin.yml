name: Deploy — Stage Admin Panel

on:
  push:
    branches: [main]
    paths:
      - 'admin/**'
      - '.github/workflows/deploy-stage-admin.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        working-directory: admin
        run: npm ci

      - name: Build staging
        working-directory: admin
        run: npm run buildProd:staging

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust server host key
        run: ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload build artifacts to server
        run: |
          rsync -az --delete \
            --rsync-path="mkdir -p ~/preptm/Admin/Stage && rsync" \
            admin/dist/new5-gstudy/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/preptm/Admin/Stage/"
