name: Deploy API Gateway

on:
  push:
    branches: [main]
    paths:
      - 'backend/5GStudyGateway/**'
      - 'backend/CommonService/**'
      - 'backend/ModelService/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Publish Gateway
        run: |
          dotnet publish backend/5GStudyGateway/Gateway.csproj \
            -c Release \
            --no-self-contained \
            -r linux-x64 \
            -o ./publish/gateway

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare server directories
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            mkdir -p /var/www/preptm/api/gateway \
                     /var/www/preptm/api/alldropdown \
                     /var/www/preptm/api/frontapi \
                     /var/www/preptm/api/master \
                     /var/www/preptm/api/translation \
                     /var/www/preptm/api/fileuploader/Content \
                     /var/www/preptm/front \
                     /var/www/preptm/admin \
                     /var/www/preptm/pm2 \
                     /var/log/preptm \
                     /var/cache/nginx/ssr \
                     /var/cache/nginx/dropdown \
                     /var/cache/nginx/front_api
          "

      - name: Push config files to server via base64
        run: |
          # Encode each config file and write directly via SSH (bypasses SCP/rsync issues)
          for f in deploy/nginx/preptm.conf deploy/nginx/admin.preptm.conf deploy/nginx/api.preptm.conf deploy/nginx/file.preptm.conf; do
            name=$(basename $f)
            content=$(base64 -w 0 $f)
            ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "echo '$content' | base64 -d > /etc/nginx/sites-available/$name"
            echo "Pushed $name"
          done
          for f in deploy/systemd/preptm-gateway.service deploy/systemd/preptm-alldropdown.service deploy/systemd/preptm-frontapi.service deploy/systemd/preptm-master.service deploy/systemd/preptm-translation.service deploy/systemd/preptm-fileuploader.service; do
            name=$(basename $f)
            content=$(base64 -w 0 $f)
            ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "echo '$content' | base64 -d > /etc/systemd/system/$name"
            echo "Pushed $name"
          done
          content=$(base64 -w 0 deploy/pm2/ecosystem.config.js)
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "echo '$content' | base64 -d > /var/www/preptm/pm2/ecosystem.config.js"
          echo "Pushed ecosystem.config.js"

      - name: Verify files on server
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            echo '=== nginx configs ===' && ls -la /etc/nginx/sites-available/*.conf
            echo '=== systemd services ===' && ls -la /etc/systemd/system/preptm-*.service
          "

      - name: Enable nginx sites and systemd services
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            ln -sf /etc/nginx/sites-available/preptm.conf       /etc/nginx/sites-enabled/preptm.conf &&
            ln -sf /etc/nginx/sites-available/admin.preptm.conf /etc/nginx/sites-enabled/admin.preptm.conf &&
            ln -sf /etc/nginx/sites-available/api.preptm.conf   /etc/nginx/sites-enabled/api.preptm.conf &&
            ln -sf /etc/nginx/sites-available/file.preptm.conf  /etc/nginx/sites-enabled/file.preptm.conf &&
            rm -f /etc/nginx/sites-enabled/default &&
            systemctl daemon-reload &&
            systemctl enable preptm-gateway preptm-alldropdown preptm-frontapi preptm-master preptm-translation preptm-fileuploader &&
            nginx -t &&
            systemctl reload nginx
          "

      - name: Stop service before deploy
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "systemctl stop preptm-gateway || true"

      - name: Sync build output to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa" \
            ./publish/gateway/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/preptm/api/gateway/

      - name: Start service
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "systemctl start preptm-gateway && systemctl status preptm-gateway --no-pager"
