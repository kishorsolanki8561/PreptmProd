name: Deploy Stage FileUploader Microservice

on:
  push:
    branches: [main]
    paths:
      - 'backend/FileUploaderMicroService/**'
      - 'backend/CommonService/**'
      - 'backend/ModelService/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Publish FileUploaderMicroService
        run: |
          dotnet publish backend/FileUploaderMicroService/FileUploaderMicroService.csproj \
            -c Release \
            --no-self-contained \
            -r linux-x64 \
            -o ./publish/fileuploader

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare server directories
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "mkdir -p /root/preptm/BackEnd/Stage/FileUploaderMicroService/Content"

      - name: Stop service before deploy
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "systemctl stop preptm-fileupload-api || true"

      - name: Sync build output to server (preserve Content folder)
        run: |
          rsync -avz --delete \
            --exclude='Content' \
            --filter='protect Content/***' \
            -e "ssh -i ~/.ssh/id_rsa" \
            ./publish/fileuploader/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/root/preptm/BackEnd/Stage/FileUploaderMicroService/

      - name: Register systemd service
        run: |
          cat > /tmp/preptm-fileupload-api.service << 'UNIT'
          [Unit]
          Description=PreptM Stage FileUploader Microservice
          After=network.target

          [Service]
          WorkingDirectory=/root/preptm/BackEnd/Stage/FileUploaderMicroService
          ExecStart=/usr/bin/dotnet /root/preptm/BackEnd/Stage/FileUploaderMicroService/FileUploaderMicroService.dll
          Restart=always
          RestartSec=10
          KillSignal=SIGINT
          SyslogIdentifier=preptm-fileupload-api
          Environment=ASPNETCORE_ENVIRONMENT=Staging
          Environment=ASPNETCORE_URLS=http://127.0.0.1:5129
          Environment=DOTNET_PRINT_TELEMETRY_MESSAGE=false

          [Install]
          WantedBy=multi-user.target
          UNIT
          scp -i ~/.ssh/id_rsa /tmp/preptm-fileupload-api.service \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/preptm-fileupload-api.service
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            mv /tmp/preptm-fileupload-api.service /etc/systemd/system/preptm-fileupload-api.service &&
            systemctl daemon-reload &&
            systemctl enable preptm-fileupload-api
          "

      - name: Start service
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "systemctl start preptm-fileupload-api && systemctl status preptm-fileupload-api --no-pager"
