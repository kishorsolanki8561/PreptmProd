name: Deploy — Stage Frontend (SSR)

on:
  push:
    branches: [main]
    paths:
      - 'front/**'
      - '.github/workflows/deploy-stage-front.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        working-directory: front
        run: npm ci

      # environment.staging.ts is automatically used here via --configuration=staging
      - name: Build staging
        working-directory: front
        run: npm run build:stage

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust server host key
        run: ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload build artifacts to server
        run: |
          rsync -az --delete \
            --rsync-path="mkdir -p ~/preptm/FrontEnd/Stage/client/preptm && rsync" \
            front/dist/preptm/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/preptm/FrontEnd/Stage/client/preptm/"

      - name: Install server dependencies on remote
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "
            cd ~/preptm/FrontEnd/Stage/client/preptm && npm install --omit=dev
          "

      - name: Reload SSR process (zero-downtime)
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "
            cp ~/preptm/FrontEnd/Stage/client/preptm/ecosystem.config.cjs ~/ecosystem.config.cjs
            cd ~ && pm2 reload ecosystem.config.cjs --update-env && pm2 save
          "
