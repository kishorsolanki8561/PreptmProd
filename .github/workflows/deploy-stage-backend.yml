name: Deploy — Stage Backend API

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-stage-backend.yml'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        default: 'All'
        type: choice
        options:
          - All
          - FrontMicroService
          - MasterMicroService
          - AllDropDownMicroService
          - FileUploaderMicroService
          - TranslationMicroService

jobs:
  deploy:
    name: Deploy ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: FrontMicroService
            project: backend/FrontMicroService/FrontMicroService.csproj
            dll: FrontMicroService
            systemd: preptm-front-api
            http_port: 5080

          - service: MasterMicroService
            project: backend/MasterMicroService/MasterMicroService.csproj
            dll: MasterMicroService
            systemd: preptm-master-api
            http_port: 5256

          - service: AllDropDownMicroService
            project: backend/AllDropDownMicroService/AllDropDownMicroService.csproj
            dll: AllDropDownMicroService
            systemd: preptm-dropdown-api
            http_port: 5294

          - service: FileUploaderMicroService
            project: backend/FileUploaderMicroService/FileUploaderMicroService.csproj
            dll: FileUploaderMicroService
            systemd: preptm-fileupload-api
            http_port: 5129
            extra_rsync_args: --exclude=Content/

          - service: TranslationMicroService
            project: backend/TranslationMicroService/TranslationMicroService.csproj
            dll: TranslationMicroService
            systemd: preptm-translation-api
            http_port: 5233

    steps:
      - name: Check if this service is selected
        id: gate
        run: |
          INPUT="${{ github.event.inputs.service }}"
          if [ -z "$INPUT" ] || [ "$INPUT" = "All" ] || [ "$INPUT" = "${{ matrix.service }}" ]; then
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.deploy == 'true'

      - uses: actions/setup-dotnet@v4
        if: steps.gate.outputs.deploy == 'true'
        with:
          dotnet-version: '6.0.x'

      - name: Publish ${{ matrix.service }}
        if: steps.gate.outputs.deploy == 'true'
        run: |
          dotnet publish ${{ matrix.project }} \
            -c Release \
            --no-self-contained \
            -r linux-x64 \
            -o publish/${{ matrix.service }}

      - name: Setup SSH
        if: steps.gate.outputs.deploy == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare deploy directory on server
        if: steps.gate.outputs.deploy == 'true'
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "mkdir -p ~/preptm/BackEnd/Stage/${{ matrix.service }}"

      - name: Stop service
        if: steps.gate.outputs.deploy == 'true'
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "sudo systemctl stop ${{ matrix.systemd }} || true"

      - name: Sync build output to server
        if: steps.gate.outputs.deploy == 'true'
        run: |
          # --checksum forces content comparison (not mtime+size) so deterministic-build
          # DLLs with identical size/mtime but different TFM content are always updated.
          rsync -az --checksum --delete \
            ${{ matrix.extra_rsync_args }} \
            -e "ssh -i ~/.ssh/id_rsa" \
            publish/${{ matrix.service }}/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/preptm/BackEnd/Stage/${{ matrix.service }}/

      - name: Install systemd service
        if: steps.gate.outputs.deploy == 'true'
        run: |
          DEPLOY_DIR=$(ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'echo $HOME')/preptm/BackEnd/Stage/${{ matrix.service }}
          cat > /tmp/${{ matrix.systemd }}.service << UNIT
          [Unit]
          Description=PreptM Stage ${{ matrix.service }}
          After=network.target

          [Service]
          WorkingDirectory=${DEPLOY_DIR}
          ExecStart=/usr/bin/dotnet ${DEPLOY_DIR}/${{ matrix.dll }}.dll
          Restart=always
          RestartSec=10
          KillSignal=SIGINT
          SyslogIdentifier=${{ matrix.systemd }}
          Environment=ASPNETCORE_ENVIRONMENT=Staging
          Environment=ASPNETCORE_URLS=http://127.0.0.1:${{ matrix.http_port }}
          Environment=DOTNET_PRINT_TELEMETRY_MESSAGE=false

          [Install]
          WantedBy=multi-user.target
          UNIT
          scp -i ~/.ssh/id_rsa /tmp/${{ matrix.systemd }}.service \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/${{ matrix.systemd }}.service
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            sudo mv /tmp/${{ matrix.systemd }}.service /etc/systemd/system/${{ matrix.systemd }}.service &&
            sudo systemctl daemon-reload &&
            sudo systemctl enable ${{ matrix.systemd }}
          "

      - name: Start service and verify
        if: steps.gate.outputs.deploy == 'true'
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} bash << 'ENDSSH'
            set -e
            sudo systemctl start ${{ matrix.systemd }}
            TIMEOUT=30
            ELAPSED=0
            until sudo systemctl is-active --quiet ${{ matrix.systemd }}; do
              if [ $ELAPSED -ge $TIMEOUT ]; then
                echo "ERROR: ${{ matrix.systemd }} did not become active within ${TIMEOUT}s"
                sudo journalctl -u ${{ matrix.systemd }} -n 50 --no-pager
                exit 1
              fi
              sleep 3
              ELAPSED=$((ELAPSED + 3))
            done
            echo "OK: ${{ matrix.systemd }} is active"
            sudo systemctl status ${{ matrix.systemd }} --no-pager
          ENDSSH
