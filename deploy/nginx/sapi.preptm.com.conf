# sapi.preptm.com — Stage API (Nginx routes directly to each microservice)
#
# Replaces the Ocelot .NET Gateway — Nginx handles all routing.
#
# Route map (mirrors ocelot.json):
#   /api/front/       → FrontMicroService        :5080
#   /api/master/      → MasterMicroService        :5256
#   /api/dropdown/    → AllDropDownMicroService   :5294
#   /api/file/        → FileUploaderMicroService  :5129
#   /api/translation/ → TranslationMicroService   :5233
#
# Install:
#   sudo cp sapi.preptm.com.conf /etc/nginx/sites-available/sapi.preptm.com
#   sudo ln -sf /etc/nginx/sites-available/sapi.preptm.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# ── Upstream definitions ──────────────────────────────────────────────────────
upstream front_api       { server 127.0.0.1:5080; keepalive 16; }
upstream master_api      { server 127.0.0.1:5256; keepalive 16; }
upstream dropdown_api    { server 127.0.0.1:5294; keepalive 16; }
upstream fileupload_api  { server 127.0.0.1:5129; keepalive 16; }
upstream translation_api { server 127.0.0.1:5233; keepalive 16; }

server {
    listen 80;
    listen [::]:80;
    server_name sapi.preptm.com;
    server_tokens off;

    # Logs
    access_log /var/log/nginx/sapi.preptm.com.access.log;
    error_log  /var/log/nginx/sapi.preptm.com.error.log;

    # Gzip
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_min_length   1024;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/json application/javascript;

    # Security headers
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Max upload size (for file upload service)
    client_max_body_size 100M;

    # Common proxy settings
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        "";
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    # Strip CORS headers from .NET backend to prevent duplicates
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;

    # ── Front Microservice ────────────────────────────────────────────────────
    location /api/front/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "https://stage.preptm.com";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers $http_access_control_request_headers;
            add_header Access-Control-Max-Age       86400;
            add_header Content-Length               0;
            return 204;
        }
        proxy_pass http://front_api/api/;
        add_header Access-Control-Allow-Origin  "https://stage.preptm.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, lang, ismobilemode" always;
    }

    # ── Master Microservice ───────────────────────────────────────────────────
    location /api/master/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "https://stage.preptm.com";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers $http_access_control_request_headers;
            add_header Access-Control-Max-Age       86400;
            add_header Content-Length               0;
            return 204;
        }
        proxy_pass http://master_api/api/;
        add_header Access-Control-Allow-Origin  "https://stage.preptm.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, lang, ismobilemode" always;
    }

    # ── AllDropDown Microservice ──────────────────────────────────────────────
    location /api/dropdown/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "https://stage.preptm.com";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers $http_access_control_request_headers;
            add_header Access-Control-Max-Age       86400;
            add_header Content-Length               0;
            return 204;
        }
        proxy_pass http://dropdown_api/api/;
        add_header Access-Control-Allow-Origin  "https://stage.preptm.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, lang, ismobilemode" always;
    }

    # ── FileUploader Microservice ─────────────────────────────────────────────
    location /api/file/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "https://stage.preptm.com";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers $http_access_control_request_headers;
            add_header Access-Control-Max-Age       86400;
            add_header Content-Length               0;
            return 204;
        }
        proxy_pass         http://fileupload_api/api/;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        add_header Access-Control-Allow-Origin  "https://stage.preptm.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, lang, ismobilemode" always;
    }

    # ── Translation Microservice ──────────────────────────────────────────────
    location /api/translation/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "https://stage.preptm.com";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers $http_access_control_request_headers;
            add_header Access-Control-Max-Age       86400;
            add_header Content-Length               0;
            return 204;
        }
        proxy_pass http://translation_api/api/;
        add_header Access-Control-Allow-Origin  "https://stage.preptm.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, lang, ismobilemode" always;
    }

    # ── Catch unknown routes ──────────────────────────────────────────────────
    location / {
        default_type application/json;
        return 404 '{"error":"route not found"}';
    }
}
