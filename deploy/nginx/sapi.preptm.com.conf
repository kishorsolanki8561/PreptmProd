# ─── PreptM Stage API (sapi.preptm.com) ──────────────────────────────────────
# Nginx routes directly to each microservice — no Ocelot gateway.
#
#   /api/dropdown/*    → AllDropDown    :5294
#   /api/front/*       → FrontApi       :5080
#   /api/master/*      → Master         :5256
#   /api/translation/* → Translation    :5233
#   /api/file/*        → FileUploader   :5129
#
# SSL terminated by Cloudflare. Nginx listens on HTTP only.
# ─────────────────────────────────────────────────────────────────────────────

# Dropdown cache – data rarely changes (10 min)
proxy_cache_path /var/cache/nginx/stage-dropdown
    levels=1:2 keys_zone=stage_dropdown_cache:10m inactive=10m max_size=100m use_temp_path=off;

# Front API cache – content pages (2 min)
proxy_cache_path /var/cache/nginx/stage-front-api
    levels=1:2 keys_zone=stage_front_api_cache:10m inactive=5m max_size=200m use_temp_path=off;

server {
    listen 80;
    server_name sapi.preptm.com;

    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript;

    add_header X-Content-Type-Options "nosniff"                         always;
    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    client_max_body_size 100M;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection        "";
    proxy_connect_timeout 10s;
    proxy_read_timeout    120s;
    proxy_send_timeout    60s;

    # Strip CORS headers from .NET backend to prevent duplicates
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;

    # ── AllDropDown (:5294) – 10-min cache ───────────────────────────────────
    location /api/dropdown/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers $http_access_control_request_headers;
            add_header Access-Control-Max-Age       86400;
            add_header Content-Length               0;
            return 204;
        }
        proxy_pass           http://127.0.0.1:5294/api/;
        proxy_cache          stage_dropdown_cache;
        proxy_cache_key      "$request_uri|$http_lang";
        proxy_cache_valid    200 10m;
        proxy_cache_bypass   $http_authorization;
        proxy_no_cache       $http_authorization;
        add_header           X-Cache-Status $upstream_cache_status always;
        add_header           Access-Control-Allow-Origin  "*" always;
        add_header           Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header           Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Lang, Adminurl, Ismobilemode, X-Requested-With" always;
    }

    # ── FrontMicroService (:5080) – 2-min cache ──────────────────────────────
    location /api/front/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers $http_access_control_request_headers;
            add_header Access-Control-Max-Age       86400;
            add_header Content-Length               0;
            return 204;
        }
        proxy_pass           http://127.0.0.1:5080/api/;
        proxy_cache          stage_front_api_cache;
        proxy_cache_key      "$request_uri|$http_lang";
        proxy_cache_valid    200 2m;
        proxy_cache_bypass   $http_authorization;
        proxy_no_cache       $http_authorization;
        add_header           X-Cache-Status $upstream_cache_status always;
        add_header           Access-Control-Allow-Origin  "*" always;
        add_header           Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header           Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Lang, Adminurl, Ismobilemode, X-Requested-With" always;
    }

    # ── MasterMicroService (:5256) – no cache ────────────────────────────────
    location /api/master/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers $http_access_control_request_headers;
            add_header Access-Control-Max-Age       86400;
            add_header Content-Length               0;
            return 204;
        }
        proxy_pass http://127.0.0.1:5256/api/;
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Lang, Adminurl, Ismobilemode, X-Requested-With" always;
    }

    # ── TranslationMicroService (:5233) – no cache ───────────────────────────
    location /api/translation/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers $http_access_control_request_headers;
            add_header Access-Control-Max-Age       86400;
            add_header Content-Length               0;
            return 204;
        }
        proxy_pass http://127.0.0.1:5233/api/;
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Lang, Adminurl, Ismobilemode, X-Requested-With" always;
    }

    # ── FileUploaderMicroService (:5129) – no cache ──────────────────────────
    location /api/file/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers $http_access_control_request_headers;
            add_header Access-Control-Max-Age       86400;
            add_header Content-Length               0;
            return 204;
        }
        proxy_pass         http://127.0.0.1:5129/api/;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Lang, Adminurl, Ismobilemode, X-Requested-With" always;
    }

    location / {
        default_type application/json;
        return 404 '{"error":"route not found"}';
    }
}
