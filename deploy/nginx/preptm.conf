# ─── PreptM Main Front-End (Angular 18 SSR) ───────────────────────────────────
# SSL is terminated by Cloudflare. Nginx listens on HTTP only.
# Single ProdFront wrapper on port 4001 handles both EN and HI routes:
#   /hi/* → Hindi SSR   (routed by start-prod.mjs)
#   /*    → English SSR (routed by start-prod.mjs)
# ──────────────────────────────────────────────────────────────────────────────

proxy_cache_path /var/cache/nginx/ssr
    levels=1:2
    keys_zone=ssr_cache:20m
    inactive=5m
    max_size=500m
    use_temp_path=off;

upstream prodfont {
    server 127.0.0.1:4001;
    keepalive 32;
}

server {
    listen 80;
    server_name preptm.com www.preptm.com;

    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml image/svg+xml font/woff2;
    gzip_static on;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection        "";

    # ── Static assets ────────────────────────────────────────────────────────
    location ~* \.(js|mjs|css|woff|woff2|ttf|eot)$ {
        proxy_pass http://prodfont;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        proxy_cache_bypass 1;
        proxy_no_cache 1;
    }

    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|avif)$ {
        proxy_pass http://prodfont;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        proxy_cache_bypass 1;
        proxy_no_cache 1;
    }

    location ~* ^/(robots\.txt|sitemap.*\.xml)$ {
        proxy_pass http://prodfont;
        expires -1;
        add_header Cache-Control "no-store, no-cache";
    }

    # ── Hindi SSR – routed internally by ProdFront wrapper ───────────────────
    location /hi/ {
        proxy_pass http://prodfont;
        proxy_cache            ssr_cache;
        proxy_cache_key        "$scheme$host$request_uri";
        proxy_cache_valid      200 2m;
        proxy_cache_valid      404 1m;
        proxy_cache_bypass     $http_authorization $cookie_token;
        proxy_no_cache         $http_authorization $cookie_token;
        add_header             X-Cache-Status $upstream_cache_status always;
        proxy_read_timeout     60s;
        proxy_connect_timeout  10s;
    }

    # ── English SSR – all other routes ───────────────────────────────────────
    location / {
        proxy_pass http://prodfont;
        proxy_cache            ssr_cache;
        proxy_cache_key        "$scheme$host$request_uri";
        proxy_cache_valid      200 2m;
        proxy_cache_valid      404 1m;
        proxy_cache_bypass     $http_authorization $cookie_token;
        proxy_no_cache         $http_authorization $cookie_token;
        add_header             X-Cache-Status $upstream_cache_status always;
        proxy_read_timeout     60s;
        proxy_connect_timeout  10s;
    }
}
