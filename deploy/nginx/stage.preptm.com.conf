# stage.preptm.com — Angular SSR Frontend (Node.js / PM2 port 4003)
#
# Static strategy:
#   - Hashed JS/CSS bundles → served directly by nginx, 1-year immutable cache
#   - /assets/ (images, icons, SVGs) → nginx, 30-day cache
#   - All page routes and API → proxied to Node.js SSR on port 4003
#
# Install:
#   sudo cp stage.preptm.com.conf /etc/nginx/sites-available/stage.preptm.com
#   sudo ln -sf /etc/nginx/sites-available/stage.preptm.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name stage.preptm.com;
    server_tokens off;

    # Logs
    access_log /var/log/nginx/stage.preptm.com.access.log;
    error_log  /var/log/nginx/stage.preptm.com.error.log;

    # Gzip
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_min_length   1024;
    gzip_comp_level   6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/x-font-ttf font/opentype image/svg+xml;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection       "1; mode=block"                   always;

    # ── Angular hashed bundles (English locale) ───────────────────────────────
    # URL:  /chunk-ABCD1234.js  →  browser/en/chunk-ABCD1234.js
    # Only matches top-level files (no /hi/ prefix) to avoid collision with Hindi.
    location ~* ^/(?!hi/)[^/]+\.(js|css|woff2?|ttf|eot)$ {
        root /root/preptm/FrontEnd/Stage/client/preptm/browser/en;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        try_files $uri @proxy;
    }

    # ── Angular hashed bundles (Hindi locale) ────────────────────────────────
    # URL:  /hi/chunk-ABCD1234.js  →  browser/hi/chunk-ABCD1234.js
    location ~* ^/hi/[^/]+\.(js|css|woff2?|ttf|eot)$ {
        root /root/preptm/FrontEnd/Stage/client/preptm/browser;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        try_files $uri @proxy;
    }

    # ── Static assets (images, icons, SVGs) — shared across locales ──────────
    location /assets/ {
        root /root/preptm/FrontEnd/Stage/client/preptm/browser/en;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        access_log off;
        try_files $uri @proxy;
    }

    # ── favicon ───────────────────────────────────────────────────────────────
    location = /favicon.ico {
        root /root/preptm/FrontEnd/Stage/client/preptm/browser/en;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        access_log off;
        try_files $uri @proxy;
    }

    # ── SSR + all page routes ─────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:4003;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Accept-Encoding   "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        proxy_buffer_size       16k;
        proxy_buffers           4 32k;
        proxy_busy_buffers_size 64k;
    }

    # ── Fallback: static file not found on disk → Node.js ────────────────────
    location @proxy {
        proxy_pass         http://127.0.0.1:4003;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding   "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}
