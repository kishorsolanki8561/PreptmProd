# ─── PreptM File Uploader Service (file.preptm.com) ──────────────────────────
# Routes to .NET FileUploaderMicroService on port 5005.
# Uploaded files (images/docs) in /Content are served directly by nginx.
# SSL terminated by Cloudflare. Nginx listens on HTTP only.
# ──────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name file.preptm.com;

    # Restore real visitor IP from Cloudflare
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    # Security
    add_header X-Content-Type-Options "nosniff" always;

    # Common proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection        "";

    # Upload size limit (adjust as needed)
    client_max_body_size 50M;

    # ── Serve uploaded static content directly (fast, no .NET overhead) ──────
    location /Content/ {
        alias /var/www/preptm/api/fileuploader/Content/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;

        # Allow images and docs only
        location ~* \.(jpg|jpeg|png|gif|webp|svg|pdf|mp4|webm)$ {
            expires 30d;
        }
    }

    # ── Upload API and other endpoints → FileUploader .NET service ───────────
    location /api/ {
        proxy_pass         http://127.0.0.1:5005;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location / {
        proxy_pass         http://127.0.0.1:5005;
        proxy_read_timeout 120s;
    }
}
