# ─── PreptM API Gateway (api.preptm.com) ──────────────────────────────────────
# Routes to .NET Ocelot Gateway on port 5000.
# Dropdown responses are cached 10 min; front-api GET responses 2 min.
# SSL terminated by Cloudflare. Nginx listens on HTTP only.
# ──────────────────────────────────────────────────────────────────────────────

# Dropdown cache – data rarely changes
proxy_cache_path /var/cache/nginx/dropdown
    levels=1:2
    keys_zone=dropdown_cache:10m
    inactive=10m
    max_size=200m
    use_temp_path=off;

# Front API cache – content pages
proxy_cache_path /var/cache/nginx/front_api
    levels=1:2
    keys_zone=front_api_cache:10m
    inactive=5m
    max_size=300m
    use_temp_path=off;

server {
    listen 80;
    server_name api.preptm.com;

    # Restore real visitor IP from Cloudflare
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    # Gzip API responses
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types application/json text/plain;

    # Security
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Common proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection        "";
    proxy_read_timeout  120s;
    proxy_connect_timeout 10s;

    # Skip cache for POST requests or authenticated requests
    # (nginx only caches GET/HEAD by default, this is an extra guard)
    set $skip_cache 0;
    if ($request_method = POST)  { set $skip_cache 1; }
    if ($http_authorization != "") { set $skip_cache 1; }

    # ── Dropdown API – 10-minute cache for GET ───────────────────────────────
    location /api/dropdown/ {
        proxy_pass http://127.0.0.1:5000;

        proxy_cache          dropdown_cache;
        proxy_cache_key      "$request_uri";
        proxy_cache_valid    200 10m;
        proxy_cache_bypass   $skip_cache;
        proxy_no_cache       $skip_cache;
        add_header           X-Cache-Status $upstream_cache_status;
    }

    # ── Front API – 2-minute cache for GET ──────────────────────────────────
    location /api/front/ {
        proxy_pass http://127.0.0.1:5000;

        proxy_cache          front_api_cache;
        proxy_cache_key      "$request_uri";
        proxy_cache_valid    200 2m;
        proxy_cache_bypass   $skip_cache;
        proxy_no_cache       $skip_cache;
        add_header           X-Cache-Status $upstream_cache_status;
    }

    # ── All other API routes – no caching ────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
    }

    location / {
        return 404;
    }
}
