# ─── PreptM API (api.preptm.com) ──────────────────────────────────────────────
# Nginx routes directly to each microservice — no Ocelot gateway needed.
#
#   /api/dropdown/*    → AllDropDown    :5001  /api/*
#   /api/front/*       → FrontApi       :5002  /api/*
#   /api/master/*      → Master         :5003  /api/*
#   /api/translation/* → Translation    :5004  /api/*
#   /api/file/*        → FileUploader   :5005  /api/*
#
# SSL terminated by Cloudflare. Nginx listens on HTTP only.
# CORS: headers added via add_header always (no if-blocks — if breaks add_header on cache hits)
# OPTIONS preflight: handled by .NET CORS middleware; nginx adds CORS headers on top via always
# ──────────────────────────────────────────────────────────────────────────────

# Dropdown cache – data rarely changes (10 min)
proxy_cache_path /var/cache/nginx/dropdown
    levels=1:2 keys_zone=dropdown_cache:10m inactive=10m max_size=200m use_temp_path=off;

# Front API cache – content pages (2 min)
proxy_cache_path /var/cache/nginx/front_api
    levels=1:2 keys_zone=front_api_cache:10m inactive=5m max_size=300m use_temp_path=off;

server {
    listen 80;
    server_name api.preptm.com;

    # Restore real visitor IP from Cloudflare
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types application/json text/plain;

    # Common proxy headers
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection        "";
    proxy_read_timeout    120s;
    proxy_connect_timeout 10s;

    # ── AllDropDown (:5001) – 10-min cache ───────────────────────────────────
    location /api/dropdown/ {
        proxy_pass           http://127.0.0.1:5001/api/;
        proxy_cache          dropdown_cache;
        proxy_cache_key      "$request_uri";
        proxy_cache_valid    200 10m;
        proxy_cache_bypass   $http_authorization;
        proxy_no_cache       $http_authorization;
        add_header           X-Cache-Status $upstream_cache_status always;
        add_header           'Access-Control-Allow-Origin'  '*' always;
        add_header           'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header           'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Lang, Adminurl, Ismobilemode, X-Requested-With' always;
        add_header           'Access-Control-Max-Age'       86400 always;
    }

    # ── FrontMicroService (:5002) – 2-min cache ──────────────────────────────
    location /api/front/ {
        proxy_pass           http://127.0.0.1:5002/api/;
        proxy_cache          front_api_cache;
        proxy_cache_key      "$request_uri";
        proxy_cache_valid    200 2m;
        proxy_cache_bypass   $http_authorization;
        proxy_no_cache       $http_authorization;
        add_header           X-Cache-Status $upstream_cache_status always;
        add_header           'Access-Control-Allow-Origin'  '*' always;
        add_header           'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header           'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Lang, Adminurl, Ismobilemode, X-Requested-With' always;
        add_header           'Access-Control-Max-Age'       86400 always;
    }

    # ── MasterMicroService (:5003) – no cache ────────────────────────────────
    location /api/master/ {
        proxy_pass http://127.0.0.1:5003/api/;
        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Lang, Adminurl, Ismobilemode, X-Requested-With' always;
        add_header 'Access-Control-Max-Age'       86400 always;
    }

    # ── TranslationMicroService (:5004) – no cache ───────────────────────────
    location /api/translation/ {
        proxy_pass http://127.0.0.1:5004/api/;
        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Lang, Adminurl, Ismobilemode, X-Requested-With' always;
        add_header 'Access-Control-Max-Age'       86400 always;
    }

    # ── FileUploaderMicroService (:5005) – no cache ──────────────────────────
    location /api/file/ {
        proxy_pass         http://127.0.0.1:5005/api/;
        client_max_body_size 50M;
        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Lang, Adminurl, Ismobilemode, X-Requested-With' always;
        add_header 'Access-Control-Max-Age'       86400 always;
    }

    location / {
        return 404;
    }
}
