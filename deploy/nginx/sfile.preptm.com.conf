# sfile.preptm.com — File Upload Service
#
# Serves uploaded content files directly via Nginx and
# proxies API calls to FileUploaderMicroService (:5129).
#
# Install:
#   sudo cp sfile.preptm.com.conf /etc/nginx/sites-available/sfile.preptm.com
#   sudo ln -sf /etc/nginx/sites-available/sfile.preptm.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name sfile.preptm.com;
    server_tokens off;

    # Logs
    access_log /var/log/nginx/sfile.preptm.com.access.log;
    error_log  /var/log/nginx/sfile.preptm.com.error.log;

    # Max upload size
    client_max_body_size 100M;

    # Gzip
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_min_length   1024;
    gzip_comp_level   6;
    gzip_types        text/plain application/json application/javascript;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;

    # ── Serve uploaded files directly from Content folder ─────────────────────
    # NOTE: do NOT use try_files here — try_files resolves paths against root,
    # not the alias path, so it always returns 404. alias alone handles 404
    # correctly when the file is missing.
    location /Content/ {
        alias /root/preptm/BackEnd/Stage/FileUploaderMicroService/Content/;
        expires 365d;
        add_header Cache-Control                "public, max-age=31536000"        always;
        add_header Vary                         "Accept"                          always;
        add_header Access-Control-Allow-Origin  "https://stage.preptm.com"        always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS"                    always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type"     always;
    }

    # ── Swagger UI (served by the .NET service itself) ───────────────────────
    location /swagger/ {
        proxy_pass         http://127.0.0.1:5129/swagger/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    # ── Proxy API calls to FileUploaderMicroService ───────────────────────────
    location /api/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "https://stage.preptm.com";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, lang";
            add_header Access-Control-Max-Age       86400;
            add_header Content-Length               0;
            return 204;
        }
        proxy_pass         http://127.0.0.1:5129/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
        add_header Access-Control-Allow-Origin  "https://stage.preptm.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, lang" always;
    }
}
