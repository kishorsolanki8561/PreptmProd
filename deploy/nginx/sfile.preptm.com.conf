# ─── PreptM Stage File Uploader (sfile.preptm.com) ───────────────────────────
# Serves uploaded content files directly via nginx.
# Proxies API calls to FileUploaderMicroService on port 5129.
# SSL terminated by Cloudflare. Nginx listens on HTTP only.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name sfile.preptm.com;

    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 100M;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection        "";

    # ── Serve uploaded files directly (no .NET overhead) ─────────────────────
    location /Content/ {
        alias /root/preptm/BackEnd/Stage/FileUploaderMicroService/Content/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;

        location ~* \.(jpg|jpeg|png|gif|webp|svg|pdf|mp4|webm)$ {
            expires 30d;
        }
    }

    # ── File upload API ───────────────────────────────────────────────────────
    location /api/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers $http_access_control_request_headers;
            add_header Access-Control-Max-Age       86400;
            add_header Content-Length               0;
            return 204;
        }
        proxy_pass         http://127.0.0.1:5129/api/;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Lang, Adminurl, Ismobilemode, X-Requested-With" always;
    }

    location / {
        proxy_pass         http://127.0.0.1:5129;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
