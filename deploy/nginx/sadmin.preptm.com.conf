# sadmin.preptm.com — Angular Admin Panel (static files served directly)
#
# Install:
#   sudo cp sadmin.preptm.com.conf /etc/nginx/sites-available/sadmin.preptm.com
#   sudo ln -sf /etc/nginx/sites-available/sadmin.preptm.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name sadmin.preptm.com;
    server_tokens off;

    # Static files root (rsync target from deploy-stage-admin.yml)
    root  /home/administrator/preptm/Admin/Stage;
    index index.html;

    # Logs
    access_log /var/log/nginx/sadmin.preptm.com.access.log;
    error_log  /var/log/nginx/sadmin.preptm.com.error.log;

    # Gzip
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript image/svg+xml;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Hashed JS/CSS/fonts — 1 year immutable cache
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp|map)$ {
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Angular router — serve index.html for all app routes
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
