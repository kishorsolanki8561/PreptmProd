<header class="header">
  <div class="header-inner wrapper gap-padding-x">

    <!-- Logo -->
    <a routerLink="/" class="logo" aria-label="Preptm Home">
      <img class="logo-desktop" src="assets/img/preptm-logo.svg" alt="Preptm logo" title="PrepTM"
        width="160" height="36" [attr.loading]="'eager'">
      <img class="logo-mobile" src="assets/img/preptm icon.svg" alt="Preptm" title="PrepTM"
        height="40" width="40" [attr.loading]="'eager'">
    </a>

    <!-- Search -->
    <div class="search-wrap" itemprop="potentialAction" itemscope itemtype="https://schema.org/SearchAction">
      <meta itemprop="target" content="https://preptm.com/{{curLang=='hi'?'hi/':''}}search/{search_term_string}" />
      <div class="search-box">
        <img class="search-icon" alt="search" src="assets/img/search.svg" *ngIf="!isSearchLoading" aria-hidden="true">
        <img class="search-icon spin" alt="loading" src="assets/img/spinner.svg" *ngIf="isSearchLoading" aria-hidden="true">
        <input
          itemprop="query-input"
          id="sertext"
          name="search_term_string"
          #toggleButton
          type="search"
          autocomplete="off"
          (focus)="onSearchFocus()"
          (focusout)="onSearchFocusout()"
          (keyup.backspace)="showSearchList=true"
          (keyup.enter)="onSearch(searchText.value)"
          [formControl]="searchText"
          i18n-placeholder
          placeholder="Search jobs, results, admit cards…"
          aria-label="Search"
        />
      </div>

      <!-- History suggestions -->
      <div *ngIf="searchTextList.length==0 && !searchText.value" #searchDiv
        [ngClass]="{'search-list-open':showSearchList,'search-list':true}">
        <ul>
          <li class="search-item" *ngFor="let hoption of historySerachText" (click)="onSearch(hoption)">
            <div class="search-item-left">
              <img src="assets/img/history.svg" alt="history" [attr.loading]="'lazy'" />
              <span>{{hoption}}</span>
            </div>
            <img class="arrow-icon" (click)="$event.stopPropagation(); searchText.setValue(hoption)"
              src="assets/svg/top-left-arrow.svg" [attr.loading]="'lazy'" alt="fill search">
          </li>
        </ul>
      </div>

      <!-- Live suggestions -->
      <div #searchDiv [ngClass]="{'search-list-open':showSearchList,'search-list':true}">
        <ul>
          <li class="search-item search-query" (click)="onSearch(searchText.value)" *ngIf="searchText.value">
            <img src="assets/img/search.svg" alt="search" [attr.loading]="'lazy'" />
            <span i18n>Search for</span>&nbsp;"<strong>{{searchText.value}}</strong>"
          </li>
          <li class="search-item" *ngFor="let option of searchTextList" (click)="onSearch(option)">
            <div class="search-item-left">
              <img src="assets/img/search.svg" alt="search" [attr.loading]="'lazy'">
              <span>{{option}}</span>
            </div>
            <img class="arrow-icon" (click)="$event.stopPropagation(); searchText.setValue(option)"
              src="assets/svg/top-left-arrow.svg" [attr.loading]="'lazy'" alt="fill search">
          </li>
        </ul>
      </div>
    </div>

    <!-- Desktop Navigation -->
    <nav class="desktop-nav" aria-label="Main navigation">
      <ng-container *ngTemplateOutlet="menu"></ng-container>
    </nav>

    <!-- Language Toggle -->
    <button
      class="lang-btn"
      i18n-title title="Change Language"
      [loading]="isLangChanged"
      [ignoreMinHeight]="true"
      (click)="changeLang(curLang=='en'?'hi':'en')"
      aria-label="Switch Language">
      <span class="lang-label" *ngIf="curLang=='hi'">EN</span>
      <span class="lang-label" *ngIf="curLang=='en'">हिं</span>
    </button>

    <!-- Loading indicator -->
    <preptm-loader *ngIf="isLoginLoading"></preptm-loader>

    <!-- Profile picture -->
    <div class="profile" *ngIf="userDetails && !isLoginLoading">
      <img class="profile-img cursor-pointer" nz-image (click)="openSidebar()" [attr.loading]="'lazy'"
        [nzSrc]="userDetails.profileImg || 'assets/img/profile-pic-placeholder.svg'" [nzDisablePreview]="true"
        [nzPlaceholder]="'assets/img/spinner.svg'" [alt]="userDetails.firstName">
    </div>

    <!-- Mobile hamburger -->
    <button class="hamburger" (click)="openMobileMenu()" aria-label="Open menu" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</header>


<!-- Nav Menu Template -->
<ng-template #menu>
  <ol class="nav-list">
    <li><a routerLink="/jobs"        routerLinkActive="nav-active" i18n>Jobs</a></li>
    <li><a routerLink="/admit-cards" routerLinkActive="nav-active" i18n>Admit Cards</a></li>
    <li><a routerLink="/syllabus"    routerLinkActive="nav-active" i18n>Syllabus</a></li>
    <li><a routerLink="/results"     routerLinkActive="nav-active" i18n>Results</a></li>
    <li><a routerLink="/exams"       routerLinkActive="nav-active" i18n>Exams</a></li>
    <li><a routerLink="/admissions"  routerLinkActive="nav-active" i18n>Admissions</a></li>
    <li><a routerLink="/schemes"     routerLinkActive="nav-active" i18n>Schemes</a></li>
  </ol>
</ng-template>


<!-- Mobile bottom-sheet menu -->
<div class="mobile-overlay" *ngIf="isMobileMenuOpen" (click)="closeMobileMenu()">
  <nav class="mobile-sheet" (click)="$event.stopPropagation()" aria-label="Mobile navigation">
    <div class="sheet-handle"></div>
    <ng-container *ngTemplateOutlet="menu"></ng-container>
  </nav>
</div>


<!-- WhatsApp notification template -->
<ng-template #whatsappNotification let-notification>
  <div class="ant-notification-notice-content">
    <div>
      <div class="ant-notification-notice-description">
        <i class="fa-brands fa-whatsapp whatsapp-icon" aria-hidden="true"></i>
        <span class="msg">Get Notifications on WhatsApp</span>
      </div>
      <div class="action-btn">
        <a target="_blank" href="https://chat.whatsapp.com/BW9AIPdks2DJcjZlGQ24Tp" class="sub"
          (click)="notification.close()">
          <span>Join Group</span>
        </a>
      </div>
    </div>
  </div>
</ng-template>
