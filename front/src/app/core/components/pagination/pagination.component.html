<pagination-template #p="paginationApi" [id]="paginationId" class="my-pagination" (pageChange)="pageChange.emit($event)"
    (pageBoundsCorrection)="pageBoundsCorrection.emit($event)">
    <ng-container *ngIf="p.pages.length>1">
        <div class="pagination-previous" [class.disabled]="p.isFirstPage()" *ngIf="directionLinks">
            <a *ngIf="!p.isFirstPage()" (click)="p.previous()">
                < </a>
        </div>

        <div *ngFor="let page of p.pages" [class.current]="p.getCurrent() === page.value">
            <a [routerLink]="this.currentRoute.split('?')[0]" [queryParams]="{page:page.value}"
                (click)="p.setCurrent(page.value)" *ngIf="p.getCurrent() !== page.value">
                <span>{{ page.label }}</span>
            </a>
            <div *ngIf="p.getCurrent() === page.value">
                <span>{{ page.label }}</span>
            </div>
        </div>

        <div class="pagination-next" [class.disabled]="p.isLastPage()" *ngIf="directionLinks">
            <a *ngIf="!p.isLastPage()" (click)="p.next()"> > </a>
        </div>
    </ng-container>
</pagination-template>
