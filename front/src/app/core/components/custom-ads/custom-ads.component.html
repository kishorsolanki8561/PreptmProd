<div class="ads-block" *ngIf="showAds">
  <div class="ad-card">
    <div class="ad-content">
      <h2>Join Our WhatsApp Group</h2>
      <p>Govt Jobs और अपडेट्स के लिए हमारा WhatsApp ग्रुप अभी जॉइन करें!</p>
      <button class="cta-button" (click)="joinWhatsApp()">Join Now</button>
    </div>
    <img src="assets/img/WhatsApp.svg" [attr.loading]="'lazy'" alt="WhatsApp Group" class="ad-image" />
  </div>
</div>
