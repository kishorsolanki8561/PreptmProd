<article class="post-card" [class]="className">

  <!-- Card Header -->
  <header class="card-header">
    <h2 class="card-title">{{ heading }}</h2>
    <a *ngIf="posts?.length && $any(posts).length >= 6"
       [routerLink]="viewMoreUrl"
       target="_blank"
       class="card-view-all"
       [attr.aria-label]="'View all ' + heading">
      <span i18n>All</span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>
  </header>

  <!-- Post List -->
  <div class="card-body" [loading]="showLoader">
    <ul class="post-list" itemscope itemtype="https://schema.org/ItemList">

      <li class="post-item"
          *ngFor="let post of posts; let i = index"
          itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">

        <meta itemprop="position" [content]="i + 1" />

        <a [routerLink]="['/', post.blockTypeSlug, post.slugUrl]"
           target="_blank"
           class="post-link"
           itemprop="url">

          <!-- Title -->
          <span class="post-title short-line-height" itemprop="name">{{ post.title }}</span>

          <!-- Badges row — stacked below title, fully contained -->
          <span class="post-badges">

            <!-- Urgency countdown -->
            <span *ngIf="post?.reminingFewDays" class="badge badge-urgent">
              <span class="badge-counter">{{ post.reminingFewDays }}</span>
              <span i18n>Day<span *ngIf="$any(post.reminingFewDays) > 1">'s</span> Left</span>
            </span>

            <!-- NEW gif -->
            <img *ngIf="post.isNew && !post.reminingFewDays"
                 src="assets/img/new-gif.gif"
                 class="badge-new"
                 alt="New post"
                 [attr.loading]="'lazy'">

          </span>
        </a>

      </li>
    </ul>
  </div>

</article>
