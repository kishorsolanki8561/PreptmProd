<!-- Quick-access icon strip (mobile) -->
<div class="gap-top">
  <preptm-mobile-menu class="lg:hidden"></preptm-mobile-menu>
</div>

<!-- Hero Stats Bar -->
<div class="hero-bar wrapper gap-padding-x">
  <a routerLink="/jobs" class="hero-stat">
    <span class="hero-stat-icon">💼</span>
    <span class="hero-stat-label" i18n>Govt. Jobs</span>
  </a>
  <a routerLink="/results" class="hero-stat">
    <span class="hero-stat-icon">📋</span>
    <span class="hero-stat-label" i18n>Results</span>
  </a>
  <a routerLink="/admit-cards" class="hero-stat">
    <span class="hero-stat-icon">🎫</span>
    <span class="hero-stat-label" i18n>Admit Cards</span>
  </a>
  <a routerLink="/exams" class="hero-stat">
    <span class="hero-stat-icon">📝</span>
    <span class="hero-stat-label" i18n>Exams</span>
  </a>
  <a routerLink="/admissions" class="hero-stat">
    <span class="hero-stat-icon">🎓</span>
    <span class="hero-stat-label" i18n>Admissions</span>
  </a>
  <a routerLink="/syllabus" class="hero-stat">
    <span class="hero-stat-icon">📚</span>
    <span class="hero-stat-label" i18n>Syllabus</span>
  </a>
  <a routerLink="/schemes" class="hero-stat">
    <span class="hero-stat-icon">🏛️</span>
    <span class="hero-stat-label" i18n>Schemes</span>
  </a>
  <a routerLink="/article" class="hero-stat">
    <span class="hero-stat-icon">📰</span>
    <span class="hero-stat-label" i18n>Articles</span>
  </a>
</div>

<!-- Main Post Grid -->
<section class="posts-section gap-top" aria-label="Latest Updates">
  <div class="wrapper gap-padding-x">
    <div class="posts-grid">

      <preptm-post-container
        viewMoreUrl="/latest"
        *ngIf="isLoading || allPosts?.recentPosts?.length"
        [showLoader]="isLoading"
        i18n-heading heading="Recent"
        [posts]="allPosts?.recentPosts"
        className="list-wrapper-1">
      </preptm-post-container>

      <preptm-post-container
        viewMoreUrl="/expiresoon"
        *ngIf="isLoading || allPosts?.expiredSoonPosts?.length"
        [showLoader]="isLoading"
        i18n-heading heading="Expire Soon"
        [posts]="allPosts?.expiredSoonPosts"
        className="list-wrapper-4">
      </preptm-post-container>

      <preptm-post-container
        viewMoreUrl="/jobs"
        *ngIf="isLoading || allPosts?.recruitments?.length"
        [showLoader]="isLoading"
        i18n-heading heading="Recruitments"
        [posts]="allPosts?.recruitments"
        className="list-wrapper-3">
      </preptm-post-container>

      <preptm-post-container
        viewMoreUrl="/private-jobs"
        *ngIf="isLoading || allPosts?.privateRecruitments?.length"
        [showLoader]="isLoading"
        i18n-heading heading="Private Jobs"
        [posts]="allPosts?.privateRecruitments"
        className="list-wrapper-3">
      </preptm-post-container>

      <preptm-post-container
        viewMoreUrl="/results"
        *ngIf="isLoading || allPosts?.results?.length"
        [showLoader]="isLoading"
        i18n-heading heading="Results"
        [posts]="allPosts?.results"
        className="list-wrapper-1">
      </preptm-post-container>

      <preptm-post-container
        viewMoreUrl="/admissions"
        *ngIf="isLoading || allPosts?.admissions?.length"
        [showLoader]="isLoading"
        i18n-heading heading="Admissions"
        [posts]="allPosts?.admissions"
        className="list-wrapper-2">
      </preptm-post-container>

      <preptm-post-container
        viewMoreUrl="/exams"
        *ngIf="isLoading || allPosts?.exams?.length"
        [showLoader]="isLoading"
        i18n-heading heading="Exams"
        [posts]="allPosts?.exams"
        className="list-wrapper-3">
      </preptm-post-container>

      <preptm-post-container
        viewMoreUrl="/admit-cards"
        *ngIf="isLoading || allPosts?.admitCards?.length"
        [showLoader]="isLoading"
        i18n-heading heading="Admit Cards"
        [posts]="allPosts?.admitCards"
        className="list-wrapper-1">
      </preptm-post-container>

      <preptm-post-container
        viewMoreUrl="/upcoming"
        *ngIf="isLoading || allPosts?.upComingPosts?.length"
        [showLoader]="isLoading"
        i18n-heading heading="Upcoming"
        [posts]="allPosts?.upComingPosts"
        className="list-wrapper-2">
      </preptm-post-container>

    </div>
  </div>
</section>

<!-- Category Section -->
<preptm-categories></preptm-categories>

<!-- About Section -->
<preptm-about-site></preptm-about-site>
