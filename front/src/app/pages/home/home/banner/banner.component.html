<div class="carousel-container" *ngIf="banners.length">
  <div class="carousel-track" #track>
    <div class="carousel-slide" *ngFor="let item of banners; let i = index">
      <div class="gap-padding-x slide image-container text-center">
        <a [href]="item.url" target="_blank" rel="noopener">
          <img [draggable]="false" [alt]="item.title" [title]="item.title"
            [attr.loading]="i === 0 ? 'eager' : 'lazy'"
            class="banner-img {{item.url ? 'cursor-pointer' : ''}}" [src]="item.attachmentUrl">
        </a>
      </div>
    </div>
  </div>
  <div class="carousel-dots" *ngIf="banners.length > 1">
    <button *ngFor="let _ of banners; let i = index" type="button" class="carousel-dot"
      [class.active]="i === currentIndex" (click)="goTo(i)" [attr.aria-label]="'Go to slide ' + (i + 1)">
    </button>
  </div>
</div>
